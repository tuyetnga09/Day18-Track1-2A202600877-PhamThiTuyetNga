<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ôn Đúng Chỗ Yếu — Human-Centered AI Prototype (Day 18)</title>
<style>
  :root{
    --ink:#17323f; --muted:#647781; --teal:#1f6f8b; --teal-d:#16596f; --teal-l:#e9f2f6;
    --green:#2f9e7d; --green-l:#e7f5ef; --red:#d9534f; --red-l:#fbeceb;
    --amber:#c98a06; --amber-l:#fdf3df; --bg:#f4f7f9; --card:#ffffff; --line:#e3eaee;
    --radius:14px; --shadow:0 1px 2px rgba(23,50,63,.06),0 6px 18px rgba(23,50,63,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Liberation Sans",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:18px 18px 80px}
  /* Header */
  header.top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;justify-content:space-between;margin-bottom:10px}
  .brand{display:flex;gap:12px;align-items:center}
  .brand .bar{width:5px;height:46px;border-radius:3px;background:var(--teal)}
  .brand h1{font-size:21px;margin:0;letter-spacing:-.2px}
  .brand p{margin:3px 0 0;color:var(--muted);font-size:13px;max-width:560px}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--amber-l);color:var(--amber);
    border:1px solid #f0dca6;font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;white-space:nowrap}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
  /* Section nav */
  .secnav{display:flex;gap:7px;overflow-x:auto;padding:6px 0 10px;margin-bottom:6px;scrollbar-width:thin}
  .secnav button{border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;display:flex;gap:7px;align-items:center}
  .secnav button .ix{font-size:11px;font-weight:800;color:#9fb1ba}
  .secnav button.active{background:var(--teal);border-color:var(--teal);color:#fff}
  .secnav button.active .ix{color:#bfe0ec}
  .secnav button:hover:not(.active){border-color:var(--teal);color:var(--teal)}
  /* Card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
  .card h2{font-size:18px;margin:0 0 4px}
  .card .sub{color:var(--muted);font-size:13.5px;margin:0 0 16px}
  .sectag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--teal);background:var(--teal-l);padding:3px 9px;border-radius:7px;margin-bottom:10px}
  h3.blk{font-size:14px;margin:20px 0 8px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  /* Flow map */
  .flow{display:flex;flex-direction:column;gap:0;margin:6px 0}
  .fbox{border:1.5px solid var(--teal);background:var(--teal-l);border-radius:12px;padding:13px 16px}
  .fbox b{font-size:14.5px;color:var(--teal-d)} .fbox span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
  .farrow{align-self:center;color:var(--teal);font-size:18px;padding:5px 0}
  .floop{border-style:dashed;background:#fff}
  .scope{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
  .scope > div{flex:1;min-width:220px;border:1px solid var(--line);border-radius:11px;padding:13px 15px}
  .scope .in{background:var(--green-l);border-color:#bfe3d4} .scope .out{background:var(--red-l);border-color:#f0cfcd}
  .scope h4{margin:0 0 7px;font-size:13px} .scope ul{margin:0;padding-left:17px;font-size:13px} .scope li{margin:3px 0}
  /* Rationale card */
  .rcard{border:1px solid #e7d3a3;background:var(--amber-l);border-left:4px solid var(--amber);border-radius:11px;padding:13px 15px;margin:14px 0}
  .rcard .rh{font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--amber);margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .rcard dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px}
  .rcard dt{font-weight:700;color:var(--ink);white-space:nowrap}
  .rcard dd{margin:0;color:#5a4a23}
  /* Agency badges */
  .ag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.3px}
  .ag.act{background:var(--green-l);color:var(--green)} .ag.ask{background:var(--amber-l);color:var(--amber)} .ag.dont{background:var(--red-l);color:var(--red)}
  /* Banners */
  .banner{display:flex;gap:11px;align-items:flex-start;border-radius:11px;padding:12px 15px;font-size:13.5px;margin:12px 0}
  .banner .bi{font-size:17px;line-height:1.2;flex:none}
  .banner.info{background:var(--teal-l);border:1px solid #cfe2ea;color:var(--teal-d)}
  .banner.ok{background:var(--green-l);border:1px solid #bfe3d4;color:#1d7a5d}
  .banner.warn{background:var(--amber-l);border:1px solid #e7d3a3;color:#8a6406}
  .banner.err{background:var(--red-l);border:1px solid #f0cfcd;color:#a83b38}
  .banner b{font-weight:700}
  .banner .x{margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;font-size:12.5px;text-decoration:underline;font-weight:600;flex:none;padding:0}
  /* Score / quiz */
  .scorebar{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .ring{--p:40;width:80px;height:80px;border-radius:50%;flex:none;display:grid;place-items:center;
    background:conic-gradient(var(--teal) calc(var(--p)*1%),#eef3f5 0);position:relative}
  .ring::after{content:"";position:absolute;inset:9px;background:#fff;border-radius:50%}
  .ring b{position:relative;z-index:1;font-size:18px}
  .ring b small{font-weight:500;color:var(--muted);font-size:12px}
  .scoremeta{font-size:14px;color:var(--muted)} .scoremeta b{color:var(--ink)}
  .qlist{margin-top:16px;display:flex;flex-direction:column;gap:9px}
  .q{display:flex;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:#fcfdfe}
  .q.wrong{border-color:#f0cfcd;background:var(--red-l)}
  .q .mk{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff}
  .q.right .mk{background:var(--green)} .q.wrong .mk{background:var(--red)}
  .q .body{flex:1;min-width:0}
  .q .qno{font-size:12px;color:var(--muted);font-weight:600}
  .q .qtext{font-size:14px;margin:1px 0 6px}
  .q .ans{font-size:12.5px;color:var(--muted)}
  .q .ans .you{color:var(--red);font-weight:600} .q .ans .key{color:var(--green);font-weight:600}
  .tag{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--teal-l);color:var(--teal-d);margin-top:7px}
  /* Weak topics */
  .weak{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:11px}
  .weak.unsure{border-color:#e7d3a3;background:#fffdf7}
  .weak .wh{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .weak .wname{font-weight:700;font-size:15px}
  .prio{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px}
  .prio.hi{background:var(--red-l);color:var(--red)} .prio.mid{background:var(--amber-l);color:var(--amber)} .prio.low{background:#eef3f5;color:var(--muted)}
  .meter{height:8px;border-radius:6px;background:#eef3f5;margin:11px 0 7px;overflow:hidden}
  .meter > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--red),#ef7e6e)}
  .weak .det{font-size:12.5px;color:var(--muted)}
  .fact{font-size:12px;color:var(--teal-d);font-weight:600;margin-top:6px}
  .infer{font-size:12px;color:var(--amber);font-weight:600;margin-top:3px}
  .linkbtn{background:none;border:none;color:var(--teal);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;margin-top:8px}
  .qdetail{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px;display:none}
  .qdetail.open{display:block}
  .qdetail .mini{font-size:12.5px;color:var(--muted);margin:5px 0}
  .qdetail .mini .you{color:var(--red);font-weight:600} .qdetail .mini .key{color:var(--green);font-weight:600}
  /* Plan */
  .plan{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:11px;transition:.2s}
  .plan.off{opacity:.5;background:#fafbfc}
  .plan .ph{display:flex;gap:12px;align-items:flex-start}
  .chk{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid var(--line);border-radius:6px;flex:none;cursor:pointer;margin-top:2px;position:relative;background:#fff}
  .chk:checked{background:var(--teal);border-color:var(--teal)}
  .chk:checked::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800}
  .plan .pmain{flex:1;min-width:0}
  .plan .ptop{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .plan .ptitle{font-weight:700;font-size:15px}
  .plan .pact{font-size:13px;color:var(--ink);margin:8px 0 4px}
  .plan .ctrls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:10px}
  .time{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .time input{width:56px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;text-align:center;color:var(--ink)}
  .reasonchips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--teal);color:var(--teal)} .chip.sel{background:var(--teal);border-color:var(--teal);color:#fff}
  .sched{display:flex;flex-direction:column;gap:9px}
  .day{display:flex;gap:12px;align-items:flex-start;padding:11px 14px;border:1px solid var(--line);border-radius:11px}
  .day .dn{font-size:12px;font-weight:700;color:#fff;background:var(--teal);border-radius:8px;padding:5px 9px;flex:none;white-space:nowrap}
  .day .dc{font-size:13.5px} .day .dc small{color:var(--muted)}
  .summary{display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 14px}
  .stat{flex:1;min-width:110px;background:var(--teal-l);border:1px solid #d4e5ec;border-radius:12px;padding:12px 14px}
  .stat .v{font-size:20px;font-weight:800;color:var(--teal-d)} .stat .k{font-size:12px;color:var(--muted)}
  /* Matrix */
  .matrix{width:100%;border-collapse:separate;border-spacing:8px;margin-top:8px}
  .matrix th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;padding:4px 8px;vertical-align:bottom}
  .matrix td{background:#fcfdfe;border:1px solid var(--line);border-radius:11px;padding:12px 13px;vertical-align:top;width:50%}
  .matrix .rowh{background:none;border:none;font-weight:800;font-size:13px;color:var(--teal-d);width:1%;white-space:nowrap;padding-right:4px}
  .matrix .ml{font-size:11px;font-weight:800;color:var(--teal);letter-spacing:.3px}
  .matrix .mtxt{font-size:13px;margin:5px 0 6px} .matrix .mwhy{font-size:11.5px;color:var(--muted)}
  /* Demo path */
  .demo{counter-reset:dp;display:flex;flex-direction:column;gap:9px}
  .demo .dp{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:#fcfdfe}
  .demo .dp::before{counter-increment:dp;content:counter(dp);width:25px;height:25px;border-radius:50%;background:var(--teal);color:#fff;font-size:13px;font-weight:800;display:grid;place-items:center;flex:none}
  .demo .dp .dt{font-size:13.5px} .demo .dp .dgo{font-size:12px;color:var(--teal);font-weight:600;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;margin-top:3px}
  /* Onboarding */
  .obdots{display:flex;gap:7px;margin-bottom:14px}
  .obdots i{width:8px;height:8px;border-radius:50%;background:var(--line)} .obdots i.on{background:var(--teal);width:22px;border-radius:5px}
  .obfeat{display:flex;flex-direction:column;gap:9px;margin:6px 0}
  .obfeat .fr{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border:1px solid var(--line);border-radius:11px}
  .obfeat .fr .ic{font-size:18px;flex:none}
  .obfeat .fr.yes{background:var(--green-l);border-color:#bfe3d4} .obfeat .fr.no{background:var(--red-l);border-color:#f0cfcd}
  .obfeat .fr > div > b{font-size:13.5px;display:block;margin-bottom:3px} .obfeat .fr span{font-size:12.5px;color:var(--muted)} .obfeat .fr span b{color:var(--ink)}
  .toggle{display:flex;gap:11px;align-items:center;border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin:10px 0;cursor:pointer}
  .toggle.on{border-color:var(--teal);background:var(--teal-l)}
  .toggle .sw{width:42px;height:24px;border-radius:999px;background:#cdd8dd;flex:none;position:relative;transition:.18s}
  .toggle.on .sw{background:var(--teal)} .toggle .sw::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s}
  .toggle.on .sw::after{left:21px}
  .toggle .tt b{font-size:13.5px;display:block} .toggle .tt span{font-size:12px;color:var(--muted)}
  /* loader */
  .loader{display:flex;gap:11px;align-items:center;padding:22px;justify-content:center;color:var(--muted);font-size:13.5px}
  .spin{width:22px;height:22px;border:3px solid var(--teal-l);border-top-color:var(--teal);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* buttons */
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  .btn.primary{background:var(--teal);color:#fff} .btn.primary:hover{background:var(--teal-d)}
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line)} .btn.ghost:hover{border-color:var(--teal);color:var(--teal)}
  .btn.sm{padding:8px 14px;font-size:13px}
  .btn:disabled{opacity:.4;cursor:default}
  .subjects{display:flex;gap:8px;margin:2px 0 14px}
  .subjects button{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
  .subjects button.active{background:var(--teal);border-color:var(--teal);color:#fff}
  .note{font-size:12.5px;color:var(--muted);background:#fbfdfe;border:1px dashed #c9d6dc;border-radius:10px;padding:11px 14px;margin-top:14px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (max-width:560px){.brand h1{font-size:18px}.rcard dl{grid-template-columns:1fr}.matrix,.matrix tbody,.matrix tr,.matrix td,.matrix th{display:block;width:auto}.matrix .rowh{padding-top:10px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="bar"></div>
      <div>
        <h1>Ôn Đúng Chỗ Yếu</h1>
        <p>Trợ lý AI cho học sinh: đọc bài quiz đã làm → chỉ ra chỗ yếu → đề xuất kế hoạch ôn. Một tính năng được thiết kế cho cả lúc AI <b>không hoàn hảo</b>.</p>
      </div>
    </div>
    <span class="pill"><span class="dot"></span>Prototype · dữ liệu mẫu</span>
  </header>

  <nav class="secnav" id="secnav"></nav>

  <div id="screen"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DỮ LIỆU MẪU (phản hồi AI viết sẵn — không gọi mô hình thật)
   ============================================================ */
const QUIZZES = {
  english: {
    title: "Quiz Ngữ pháp Tiếng Anh — Unit 5", unit: "10 câu",
    questions: [
      {n:1, text:"We ___ our grandparents last weekend.", concept:"Thì quá khứ đơn", correct:true,  you:"visited", key:"visited"},
      {n:2, text:"I ___ sushi before — it's totally new to me.", concept:"Thì hiện tại hoàn thành", correct:false, you:"didn't eat", key:"have never eaten"},
      {n:3, text:"The woman ___ lives next door is a nurse.", concept:"Mệnh đề quan hệ", correct:false, you:"which", key:"who"},
      {n:4, text:"I ___ this movie three times — it's great.", concept:"Thì hiện tại hoàn thành", correct:true, you:"have watched", key:"have watched"},
      {n:5, text:"He ___ his homework already.", concept:"Thì hiện tại hoàn thành", correct:false, you:"finished", key:"has finished"},
      {n:6, text:"The book ___ I borrowed is really useful.", concept:"Mệnh đề quan hệ", correct:true, you:"that", key:"that"},
      {n:7, text:"This is the village ___ I was born.", concept:"Mệnh đề quan hệ", correct:false, you:"which", key:"where"},
      {n:8, text:"If I ___ you, I would apologize first.", concept:"Câu điều kiện loại 2", correct:false, you:"am", key:"were"},
      {n:9, text:"They ___ each other since 2015.", concept:"Thì hiện tại hoàn thành", correct:false, you:"knew", key:"have known"},
      {n:10, text:"She ___ to the meeting yesterday.", concept:"Thì quá khứ đơn", correct:true, you:"didn't come", key:"didn't come"}
    ]
  },
  math: {
    title: "Quiz Đại số 9 — Ôn giữa kỳ", unit: "8 câu",
    questions: [
      {n:1, text:"Phân tích thành nhân tử: x² − 9", concept:"Phân tích đa thức", correct:true,  you:"(x−3)(x+3)", key:"(x−3)(x+3)"},
      {n:2, text:"Giải phương trình: x² − 5x + 6 = 0", concept:"Phương trình bậc hai", correct:false, you:"x = 1; x = 6", key:"x = 2; x = 3"},
      {n:3, text:"Giải hệ: x + y = 5 ; x − y = 1", concept:"Hệ phương trình", correct:false, you:"x=2; y=3", key:"x=3; y=2"},
      {n:4, text:"Hàm y = 2x − 1 cắt trục tung tại điểm?", concept:"Hàm số bậc nhất", correct:true, you:"(0; −1)", key:"(0; −1)"},
      {n:5, text:"Số nghiệm thực của x² + 4 = 0 ?", concept:"Phương trình bậc hai", correct:false, you:"2 nghiệm", key:"Vô nghiệm trên ℝ"},
      {n:6, text:"Giải phương trình: x² − 6x + 9 = 0", concept:"Phương trình bậc hai", correct:true, you:"x = 3 (nghiệm kép)", key:"x = 3 (nghiệm kép)"},
      {n:7, text:"Tính Δ của x² − 4x + 4 = 0", concept:"Phương trình bậc hai", correct:false, you:"Δ = 4", key:"Δ = 0"},
      {n:8, text:"Giải hệ: 2x + y = 7 ; x = 2", concept:"Hệ phương trình", correct:false, you:"y = 5", key:"y = 3"}
    ]
  }
};
const CONCEPT_TIPS = {
  "Thì hiện tại hoàn thành":{act:"Ôn cấu trúc have/has + V3 và phân biệt với quá khứ đơn qua dấu hiệu since/for, already/yet, ever/never.",drill:"12 câu chia động từ + 5 câu phân biệt với quá khứ đơn"},
  "Mệnh đề quan hệ":{act:"Phân biệt who / which / that và trạng từ quan hệ where / when; khi nào lược bỏ được đại từ quan hệ.",drill:"8 câu nối câu dùng đại từ quan hệ"},
  "Câu điều kiện loại 2":{act:"Công thức: If + quá khứ đơn (were cho mọi ngôi) → would + V. Dùng cho giả định không có thật ở hiện tại.",drill:"6 câu viết lại + 4 câu chọn đáp án"},
  "Phương trình bậc hai":{act:"Ôn công thức nghiệm và biệt thức Δ; khi nào nhẩm nghiệm bằng Vi-ét; điều kiện có / vô nghiệm.",drill:"6 phương trình giải đầy đủ + 3 bài Vi-ét"},

const screenEl = document.getElementById("screen");
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function cssesc(s){return s.replace(/"/g,'\\"');}
let toastT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2800);}
function goto(id){APP.section=id;render();window.scrollTo({top:0,behavior:"smooth"});}

/* Phân tích chỗ yếu */
function analyze(subject){
  const qs=QUIZZES[subject].questions, totals={}, wrongs={};
  qs.forEach(q=>{totals[q.concept]=(totals[q.concept]||0)+1; if(!q.correct) wrongs[q.concept]=(wrongs[q.concept]||[]).concat(q);});
  const out=Object.keys(wrongs).map(c=>{
    const w=wrongs[c].length,t=totals[c];
    const tip=CONCEPT_TIPS[c]||{act:"Ôn lại lý thuyết và làm thêm bài luyện của chủ đề này.",drill:"8–10 câu luyện tập"};
    return {concept:c,wrong:w,total:t,rate:Math.round(w/t*100),
      priority:w>=3?"hi":(w>=2?"mid":"low"), unsure:w<=1,
      minutes:15+5*(w-1), qnos:wrongs[c].map(q=>q.n), questions:wrongs[c], act:tip.act, drill:tip.drill};
  });
  out.sort((a,b)=>b.wrong-a.wrong||b.rate-a.rate);
  return out;
}
function scoreOf(subject){const qs=QUIZZES[subject].questions,right=qs.filter(q=>q.correct).length;return {right,total:qs.length,pct:Math.round(right/qs.length*100)};}
function initPlan(subject){APP.aft.plan={};APP.aft.reject={};APP.aft.reason={};analyze(subject).forEach(w=>APP.aft.plan[w.concept]={included:true,minutes:w.minutes});}

/* Rationale card builder */
function rcard(title, rows){
  let dl="";
  rows.forEach(r=>{dl+="<dt>"+r[0]+"</dt><dd>"+r[1]+"</dd>";});
  return '<div class="rcard"><div class="rh">🧭 Design rationale — '+esc(title)+'</div><dl>'+dl+'</dl></div>';
}

      +'<div class="ph"><input type="checkbox" class="chk" '+(p.included&&!rejected?'checked':'')+' data-toggle="'+esc(w.concept)+'">'
      +'<div class="pmain"><div class="ptop"><span class="ptitle">'+esc(w.concept)+'</span>'
      +'<span class="prio '+w.priority+'">'+(w.priority==="hi"?"Ưu tiên cao":w.priority==="mid"?"Ưu tiên vừa":"Ưu tiên thấp")+'</span></div>'
      +'<div class="pact">'+esc(w.act)+'</div>'
      +'<div class="ctrls"><span class="time">⏱ <input type="number" min="5" max="120" step="5" value="'+p.minutes+'" data-min="'+esc(w.concept)+'"> phút</span></div>';
    // explicit reject + reason
    if(rejected){
      body+='<div class="banner info" style="margin:10px 0 0"><span class="bi">🚫</span><div>Bạn đã từ chối chủ đề này'+(a.reason[w.concept]?' — lý do: <b>'+esc(a.reason[w.concept])+'</b>':'')+'. <button class="x" data-unreject="'+esc(w.concept)+'">Đưa lại vào kế hoạch</button></div></div>';
    } else {
      body+='<div class="reasonchips"><span style="font-size:12px;color:var(--muted);align-self:center">Không cần ôn? Cho AI biết vì sao:</span>'
        +['Đã hiểu rồi','Sẽ tự ôn ngoài','Không phải chỗ yếu thật'].map(rs=>'<button class="chip" data-reject="'+esc(w.concept)+'" data-reason="'+esc(rs)+'">'+rs+'</button>').join("")+'</div>';
    }
    body+='</div></div></div>';
  });

  // schedule
  body+='<h3 class="blk">Lịch ôn đề xuất</h3><div class="sched" id="sched"></div>';

  // ASK — add to calendar
  if(a.calendar==="pending"){
    body+='<div class="banner warn"><span class="bi">📅</span><div style="flex:1"><span class="ag ask">ASK</span> &nbsp;<b>Thêm các buổi ôn này vào lịch của bạn?</b><br>Đặt lịch ảnh hưởng tới thời gian thật của bạn nên AI <b>hỏi trước</b>, không tự thêm.'
      +'<div class="row" style="margin-top:11px"><button class="btn primary sm" id="calAdd">Thêm vào lịch</button><button class="btn ghost sm" id="calLater">Để sau</button></div></div></div>';
  } else if(a.calendar==="added"){
    body+='<div class="banner ok"><span class="bi">✓</span><div>Đã thêm vào lịch theo xác nhận của bạn.<button class="x" id="calUndo">Bỏ khỏi lịch</button></div></div>';
  } else {
    body+='<div class="banner info"><span class="bi">🕗</span><div>Chưa thêm vào lịch — bạn chọn "để sau".<button class="x" id="calAsk">Thêm vào lịch</button></div></div>';
  }

  // DON'T ACT
  body+='<div class="banner err"><span class="bi">🔒</span><div><span class="ag dont">DON\'T ACT</span> &nbsp;AI sẽ <b>không</b> tự gửi kế hoạch cho giáo viên, không tự đánh dấu bạn "đã giỏi" chủ đề nào, và không chấm lại bài. Những việc rủi ro cao / khó hoàn tác này luôn do bạn quyết.</div></div>';

  body+=rcard("Kế hoạch & mức tự chủ",[
    ["Dữ kiện vs suy luận","Câu sai là dữ kiện; ưu tiên & thời lượng là đề xuất của AI, sửa được."],
    ["Act — vì sao","Sắp xếp lại danh sách: rủi ro thấp, hiển thị ngay, một nút hoàn tác."],
    ["Ask — vì sao","Thêm vào lịch tác động tới đời thật → cần người dùng duyệt."],
    ["Don't Act — vì sao","Gửi GV / đánh dấu 'đã giỏi' khó hoàn tác, ảnh hưởng đánh giá → AI không được tự làm."],
    ["Người dùng kiểm soát ở đâu","Bật/tắt, đổi phút, từ chối kèm lý do, hoàn tác mọi hành động tự động."]
  ]);
  body+='<div class="row"><button class="btn ghost" data-go="02">← Xem phân tích</button><button class="btn primary" id="accept">Chấp nhận kế hoạch</button><button class="btn ghost" data-go="04">Lỡ AI phân loại sai? →</button></div>';
  body+='</div>';
  return body;
}
function refreshPlan(){
  const a=APP.aft, data=analyze(APP.dur.subject);
  const inc=data.filter(w=>a.plan[w.concept] && a.plan[w.concept].included && !a.reject[w.concept]);
  const totalMin=inc.reduce((s,w)=>s+a.plan[w.concept].minutes,0);
  const sm=document.getElementById("summary");
  if(sm) sm.innerHTML='<div class="stat"><div class="v">'+inc.length+'</div><div class="k">chủ đề cần ôn</div></div>'
    +'<div class="stat"><div class="v">'+totalMin+'<small style="font-size:12px"> phút</small></div><div class="k">tổng thời lượng</div></div>'
    +'<div class="stat"><div class="v">'+(inc.length?inc.length+(inc.length>1?'+1':''):0)+'</div><div class="k">ngày (gồm ôn lại)</div></div>';
  const sc=document.getElementById("sched");
  if(sc){
    if(!inc.length){sc.innerHTML='<div class="day"><div class="dc"><small>Chưa chọn chủ đề nào để ôn.</small></div></div>';return;}
    let h=""; inc.forEach((w,i)=>h+='<div class="day"><div class="dn">Ngày '+(i+1)+'</div><div class="dc"><b>'+esc(w.concept)+'</b> · '+a.plan[w.concept].minutes+' phút<br><small>'+esc(w.drill)+'</small></div></div>');
    if(inc.length>1) h+='<div class="day"><div class="dn">Ngày '+(inc.length+1)+'</div><div class="dc"><b>Ôn lại tổng hợp</b><br><small>Làm lại các câu từng sai để kiểm tra đã chắc chưa.</small></div></div>';
    sc.innerHTML=h;
  }
}
function bind03(){
  refreshPlan();
  const a=APP.aft;
  const ur=document.getElementById("undoReorder"); if(ur) ur.onclick=()=>{a.reordered=false;toast("Đã hoàn tác sắp xếp tự động");render();};
  const rr=document.getElementById("redoReorder"); if(rr) rr.onclick=()=>{a.reordered=true;render();};
  document.querySelectorAll('[data-toggle]').forEach(el=>el.onchange=e=>{const c=e.target.dataset.toggle; if(a.plan[c]){a.plan[c].included=e.target.checked;render();}});
  document.querySelectorAll('[data-min]').forEach(el=>el.onchange=e=>{let v=parseInt(e.target.value)||0;v=Math.max(5,Math.min(120,v));a.plan[e.target.dataset.min].minutes=v;refreshPlan();});
  document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>{a.reject[b.dataset.reject]=true;a.reason[b.dataset.reject]=b.dataset.reason;toast('Đã ghi lý do: "'+b.dataset.reason+'"');render();});
  document.querySelectorAll('[data-unreject]').forEach(b=>b.onclick=()=>{delete a.reject[b.dataset.unreject];delete a.reason[b.dataset.unreject];render();});
  const ca=document.getElementById("calAdd"); if(ca) ca.onclick=()=>{a.calendar="added";toast("Đã thêm 3 buổi ôn vào lịch");render();};
  const cl=document.getElementById("calLater"); if(cl) cl.onclick=()=>{a.calendar="later";render();};
  const cu=document.getElementById("calUndo"); if(cu) cu.onclick=()=>{a.calendar="pending";render();};
  const ck=document.getElementById("calAsk"); if(ck) ck.onclick=()=>{a.calendar="pending";render();};
  const ac=document.getElementById("accept"); if(ac) ac.onclick=()=>toast("Đã lưu kế hoạch (prototype — chưa ghi dữ liệu thật)");
}

    +rcard("Quyết định 3 — Đặt lịch phải xin phép (Ask)",[
      ["Bối cảnh","AI có thể thêm buổi ôn vào lịch người dùng."],
      ["Vì sao Ask","Ảnh hưởng thời gian thật → tác động đáng kể, cần duyệt."],
      ["Khôi phục","Có nút 'Bỏ khỏi lịch' ngay sau khi thêm."]
    ])
    +rcard("Quyết định 4 — Không tự gửi GV / đánh dấu 'đã giỏi' (Don't Act)",[
      ["Bối cảnh","Hai hành động hấp dẫn nhưng nhạy cảm."],
      ["Vì sao không","Khó hoàn tác, ảnh hưởng đánh giá/quan hệ với GV."],
      ["Thay vào đó","AI chỉ tạo nháp/đề xuất, người dùng tự quyết."]
    ])
    +rcard("Quyết định 5 — Lớp bằng chứng truy ngược câu sai",[
      ["Bối cảnh","Người học khó tin 'bạn yếu chủ đề X'."],
      ["Quyết định","Mỗi chủ đề dẫn về đúng các câu đã sai để kiểm chứng."],
      ["Lợi ích","Người dùng tự xác minh và phát hiện được lỗi phân loại."]
    ])
    +'<div class="row"><button class="btn primary" data-go="07">Xem demo path →</button></div></div>';
}

/* ============================================================
   07 — DEMO PATH (5 phút)
   ============================================================ */
function sec07(){
  const steps=[
    ["Người dùng, vấn đề & tính năng","Mở mục 00 — học sinh sau quiz cần biết ôn gì trước.","00"],
    ["Onboarding","Mục 01 — bấm qua 3 bước, bật quyền đọc quiz.","01"],
    ["Trong khi AI hỗ trợ","Mục 02 — bấm 'Cho AI phân tích', xem lớp bằng chứng, trả lời câu AI hỏi lại.","02"],
    ["Agency: Act / Ask / Don't Act","Mục 03 — hoàn tác sắp xếp (Act), trả lời thêm-vào-lịch (Ask), xem ranh giới Don't Act.","03"],
    ["Lỗi & khôi phục","Mục 04 — sửa chủ đề AI gán nhầm (KB1) và dừng nhắc việc đã xong (KB2).","04"],
    ["Feedback hai chiều","Mục 05 — chỉ ra đủ 4 ô tín hiệu trong ma trận 2×2.","05"],
    ["Quyết định & rủi ro còn lại","Mục 06 — nêu quyết định quan trọng nhất (Don't Act) và rủi ro còn lại.","06"]
  ];
  let body='<div class="card fade"><span class="sectag">07 · DEMO PATH — 5 phút</span>'
    +'<h2>Đường demo cho giảng viên</h2><p class="sub">Bấm theo thứ tự để đi đúng các nhánh quan trọng trong 5 phút.</p><div class="demo">';
  steps.forEach(s=>{body+='<div class="dp"><div><div class="dt"><b>'+esc(s[0])+'</b> — '+esc(s[1])+'</div><button class="dgo" data-go="'+s[2]+'">→ Tới mục '+s[2]+'</button></div></div>';});
  body+='</div>';
  body+='<div class="note"><b>Ghi chú trung thực:</b> mọi quiz, câu trả lời và phản hồi AI ở đây là <b>dữ liệu mẫu</b> viết sẵn để present — chưa nối mô hình/AI thật. Trọng tâm là <b>trải nghiệm khi AI không hoàn hảo</b>, không phải độ chính xác của mô hình.</div>';
  body+='<div class="row"><button class="btn primary" data-go="00">↺ Về đầu (Flow map)</button></div></div>';
  return body;
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  renderNav();
  const map={ "00":sec00,"01":sec01,"02":sec02,"03":sec03,"04":sec04,"05":sec05,"06":sec06,"07":sec07 };
  screenEl.innerHTML = map[APP.section]();
  // rebind go-buttons inside content
  screenEl.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>goto(b.dataset.go));
  if(APP.section==="01") bind01();
  else if(APP.section==="02") bind02();
  else if(APP.section==="03") bind03();
  else if(APP.section==="04") bind04();
}

/* init */
initPlan(APP.dur.subject);
render();
</script>
